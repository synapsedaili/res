name: Otonom Qwen 

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  autonomous-research:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Depoyu Çek
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ollama'yı İndir ve Kur
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5

      - name: Qwen3 Modelini İndir
        run: ollama pull qwen3:4b

      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Otonom Araştırma Botunu Çalıştır
        run: python research_agent.py

      - name: Raporu ve Fikir Havuzunu Kaydet
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add raporlar/ fikir_havuzu.json
          git diff --staged --quiet || git commit -m "🤖 Günlük rapor ve fikir havuzu güncellendi [skip ci]"
          git push

