name:  Qwen res

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  local-research:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Depoyu Çek
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ollama'yı İndir ve Kur
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5

      - name: Qwen Modelini İndir
        run: ollama pull qwen3

      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Araştırma Botunu Çalıştır
        run: python research_agent.py

      - name: Raporu GitHub'a Kaydet (Güvenli Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add raporlar/
          # Sadece değişiklik varsa commit et ve push yap, yoksa hata verme
          git diff --staged --quiet || git commit -m "🤖 Günlük araştırma raporu güncellendi [skip ci]"
          git diff --staged --quiet || git push

